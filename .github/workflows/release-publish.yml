name: Release Publish

# Manually triggered after release-draft.yml has completed and the draft
# release on GitHub has been reviewed and confirmed to look correct.
# Only stable tags (vX.Y.Z with no suffix) are accepted.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.2.4) — stable tags only, no suffix'
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
    - name: Verify tag is a stable release
      run: |
        TAG="${{ github.event.inputs.tag }}"
        if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "error: '$TAG' is not a stable release tag (must match v[0-9]+.[0-9]+.[0-9]+, no suffix)." >&2
          exit 1
        fi

    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.tag }}

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Flip GitHub release from draft to published
      run: gh release edit "${{ github.event.inputs.tag }}" --draft=false
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Authenticate with crates.io
      id: auth
      uses: rust-lang/crates-io-auth-action@v1

    - name: Publish to crates.io
      run: cargo publish
      env:
        CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
