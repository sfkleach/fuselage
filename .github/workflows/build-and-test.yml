name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC — weekly bitrot detection on main.
  workflow_dispatch:
  workflow_call:

jobs:
  test:
    # fuselage requires Linux mount namespaces
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, beta]

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}
        components: clippy, rustfmt

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Format check
      run: cargo fmt --check

    - name: Clippy
      run: cargo clippy --all-targets -- -D warnings

    - name: Run tests
      run: cargo test

    - name: Build
      run: cargo build --release

    - name: Smoke test
      run: |
        ./target/release/fuselage --version
        ./target/release/fuselage --help
      shell: bash

    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: fuselage-${{ matrix.rust }}
        path: target/release/fuselage
        retention-days: 1

  integration:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Build fuselage
      run: |
        cargo build --release
        sudo chown root:root target/release/fuselage
        sudo chmod u+s target/release/fuselage

    - name: Test ephemeral tmpdir
      shell: bash
      run: |
        # Verify fuselage provides FUSELAGE_TMPDIR and the dir exists
        ./target/release/fuselage -- bash -c '
          [[ -n "$FUSELAGE_TMPDIR" ]] || { echo "ERROR: FUSELAGE_TMPDIR not set"; exit 1; }
          [[ -d "$FUSELAGE_TMPDIR" ]]  || { echo "ERROR: FUSELAGE_TMPDIR does not exist"; exit 1; }
          echo "✓ FUSELAGE_TMPDIR=$FUSELAGE_TMPDIR"
        '

    - name: Test dynamic archive
      shell: bash
      run: |
        # Create a small zip and verify --dynamic extraction
        mkdir -p /tmp/testpkg
        echo "hello" > /tmp/testpkg/greeting.txt
        cd /tmp/testpkg && zip -q /tmp/test.zip greeting.txt && cd -

        ./target/release/fuselage --dynamic=pkg:/tmp/test.zip -- bash -c '
          [[ -f "$FUSELAGE_DYNAMIC/pkg/greeting.txt" ]] \
            || { echo "ERROR: extracted file not found"; exit 1; }
          echo "✓ dynamic archive extracted"
        '

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy

    - name: Clippy (all targets)
      run: cargo clippy --all-targets -- -D warnings

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo-audit
      run: cargo install cargo-audit

    - name: Run security audit
      run: cargo audit
