name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  check-changelog:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Check CHANGELOG top section matches tag
      run: python3 scripts/extract-changelog.py ${{ github.ref_name }}

  test:
    uses: ./.github/workflows/build-and-test.yml

  create-release:
    needs: [check-changelog, test]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Extract release notes
      id: notes
      run: |
        {
          echo "body<<ENDOFBODY"
          python3 scripts/extract-changelog.py ${{ github.ref_name }}
          echo "ENDOFBODY"
        } >> "$GITHUB_OUTPUT"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        body: ${{ steps.notes.outputs.body }}
        prerelease: ${{ contains(github.ref_name, '-rc') }}
        draft: ${{ contains(github.ref_name, '-') && !contains(github.ref_name, '-rc') }}

  upload-binaries:
    needs: create-release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install cross-compilation tools
      if: matrix.target == 'aarch64-unknown-linux-gnu'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu

    - name: Build release binary
      run: cargo build --release --target ${{ matrix.target }}
      env:
        CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

    - name: Package binary
      id: package
      run: |
        BINARY=target/${{ matrix.target }}/release/fuselage
        ARCHIVE=fuselage-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
        tar czf "$ARCHIVE" -C "$(dirname $BINARY)" "$(basename $BINARY)"
        echo "archive=$ARCHIVE" >> $GITHUB_OUTPUT

    - name: Generate checksum
      run: sha256sum ${{ steps.package.outputs.archive }} > ${{ steps.package.outputs.archive }}.sha256

    - name: Upload binary and checksum to GitHub Release
      run: gh release upload ${{ github.ref_name }} ${{ steps.package.outputs.archive }} ${{ steps.package.outputs.archive }}.sha256
      env:
        GH_TOKEN: ${{ github.token }}

